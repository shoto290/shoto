name: Bump plugin versions

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions for changed plugins
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          set -euo pipefail

          if git diff --name-only "$BASE_REF...HEAD" -- '.github/workflows/' | grep -q .; then
            echo "::warning::PR modifies .github/workflows/ — version bump skipped. Review the workflow changes and bump manually."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          changed=$(git diff --name-only "$BASE_REF...HEAD" -- 'plugins/' \
            | awk -F/ 'NF>=2 {print $2}' | sort -u)

          for plugin in $changed; do
            manifest="plugins/$plugin/.claude-plugin/plugin.json"
            [ -f "$manifest" ] || continue
            ./plugins/utils/skills/versioning/scripts/bump-plugin-version.sh \
              "$plugin" --base "$BASE_REF" --apply
          done

          if git diff --quiet -- 'plugins/*/.claude-plugin/plugin.json'; then
            echo "No version bumps required."
            exit 0
          fi

          git add plugins/*/.claude-plugin/plugin.json
          git commit -m "chore: bump plugin versions"
          git push origin "HEAD:${{ github.head_ref }}"
